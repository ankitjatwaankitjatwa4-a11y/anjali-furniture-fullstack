</head>
<body class="h-full bg-cream font-body text-charcoal overflow-auto">
<div id="app" class="min-h-full w-full"></div>
<script>
// =============================================
// CONFIGURATION — CHANGE THIS TO YOUR BACKEND URL
// =============================================
const BASE_URL = 'https://anjali-furniture-fullstack.onrender.com'; // e.g. https://anjali-furniture-api.onrender.com

const PRIMARY = '#8b6341';
const ACCENT  = '#c4a373';
const CREAM   = '#FAF7F2';

// =============================================
// STATE
// =============================================
let products = [];
let inquiries = [];
let reviews = [];
let currentPage = 'home';
let currentCategory = 'all';
let currentWood = 'all';
let priceRange = [0, 500000];
let searchQuery = '';
let selectedProduct = null;
let wishlist = JSON.parse(localStorage.getItem('af_wishlist') || '[]');
let compareList = [];
let adminToken = localStorage.getItem('af_admin_token') || null;
let isAdminLoggedIn = !!adminToken;
let showMobileMenu = false;
let activeTab = 'dashboard';
let editingProduct = null;
let toastMessage = null;
let imageGalleryIndex = 0;
let loading = false;

const CATEGORIES = [
  {id:'beds',name:'Beds',icon:'🛏️'},
  {id:'sofa',name:'Sofas',icon:'🛋️'},
  {id:'tables',name:'Tables',icon:'🪑'},
  {id:'chairs',name:'Chairs',icon:'💺'},
  {id:'wardrobes',name:'Wardrobes',icon:'🗄️'},
  {id:'doors',name:'Doors',icon:'🚪'},
  {id:'custom',name:'Custom',icon:'✨'}
];
const WOOD_TYPES = [
  {id:'sheesham',name:'Sheesham',description:'Dense, durable, beautiful grain'},
  {id:'teak',name:'Teak',description:'Premium, weather-resistant'},
  {id:'sagwan',name:'Sagwan',description:'Traditional, strong, affordable'},
  {id:'engineered',name:'Engineered',description:'Modern, cost-effective'}
];
const TESTIMONIALS = [
  {id:1,name:'Rajesh Kumar',location:'Delhi',rating:5,text:'Exceptional quality! The bed we purchased is a masterpiece.',avatar:'RK'},
  {id:2,name:'Priya Sharma',location:'Mumbai',rating:5,text:'Beautiful sofa set delivered on time. The craftsmanship is outstanding!',avatar:'PS'},
  {id:3,name:'Amit Patel',location:'Ahmedabad',rating:5,text:'Custom wardrobe exceeded expectations. Great communication throughout.',avatar:'AP'},
  {id:4,name:'Sunita Verma',location:'Jaipur',rating:5,text:'The dining table is stunning! Received many compliments from guests.',avatar:'SV'}
];

// =============================================
// API HELPERS
// =============================================
async function apiGet(path) {
  const headers = {};
  if (adminToken) headers['Authorization'] = `Bearer ${adminToken}`;
  const res = await fetch(BASE_URL + path, { headers });
  return res.json();
}

async function apiPost(path, body, auth = false) {
  const headers = { 'Content-Type': 'application/json' };
  if (auth && adminToken) headers['Authorization'] = `Bearer ${adminToken}`;
  const res = await fetch(BASE_URL + path, { method: 'POST', headers, body: JSON.stringify(body) });
  return res.json();
}

async function apiPut(path, body) {
  const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` };
  const res = await fetch(BASE_URL + path, { method: 'PUT', headers, body: JSON.stringify(body) });
  return res.json();
}

async function apiDelete(path) {
  const headers = { 'Authorization': `Bearer ${adminToken}` };
  const res = await fetch(BASE_URL + path, { method: 'DELETE', headers });
  return res.json();
}

// =============================================
// DATA LOADERS
// =============================================
async function loadProducts(filters = {}) {
  loading = true; renderApp();
  try {
    const params = new URLSearchParams();
    if (filters.category && filters.category !== 'all') params.set('category', filters.category);
    if (filters.wood && filters.wood !== 'all') params.set('wood', filters.wood);
    if (filters.search) params.set('search', filters.search);
    if (filters.featured) params.set('featured', 'true');
    if (filters.newArrival) params.set('newArrival', 'true');
    if (filters.bestSeller) params.set('bestSeller', 'true');
    const data = await apiGet(`/api/products?${params}`);
    if (data.success) products = data.products;
  } catch(e) { showToast('Could not load products. Check backend URL.', 'error'); }
  loading = false; renderApp();
}

async function loadAdminData() {
  try {
    const [iq, rv] = await Promise.all([apiGet('/api/inquiry'), apiGet('/api/review')]);
    if (iq.success) inquiries = iq.inquiries;
    if (rv.success) reviews = rv.reviews;
  } catch(e) {}
  renderApp();
}

// =============================================
// UTILITIES
// =============================================
function formatPrice(p) { return '₹' + Number(p).toLocaleString('en-IN'); }

function getProductBg(product) {
  if (product.images && product.images.length > 0 && product.images[imageGalleryIndex]) {
    const img = product.images[imageGalleryIndex];
    return `url('${img}') center/cover no-repeat`;
  }
  const map = {
    beds:'linear-gradient(135deg,#8B4513 0%,#D2691E 100%)',
    sofa:'linear-gradient(135deg,#4a3728 0%,#8B7355 100%)',
    tables:'linear-gradient(135deg,#654321 0%,#BC8F8F 100%)',
    chairs:'linear-gradient(135deg,#5D4E37 0%,#C4A484 100%)',
    wardrobes:'linear-gradient(135deg,#3E2723 0%,#795548 100%)',
    doors:'linear-gradient(135deg,#4E342E 0%,#8D6E63 100%)',
    custom:'linear-gradient(135deg,#FF8F00 0%,#FFB300 100%)'
  };
  return map[product.category] || `linear-gradient(135deg,${PRIMARY} 0%,${ACCENT} 100%)`;
}

function getProductBgByIndex(product, index) {
  if (product.images && product.images[index]) {
    return `url('${product.images[index]}') center/cover no-repeat`;
  }
  return getProductBg(product);
}

function showToast(message, type = 'success') {
  toastMessage = { message, type };
  renderApp();
  setTimeout(() => { toastMessage = null; renderApp(); }, 3000);
}

function getFilteredProducts() {
  return products.filter(p => {
    const matchCat = currentCategory === 'all' || p.category === currentCategory;
    const matchWood = currentWood === 'all' || p.wood === currentWood;
    const matchPrice = p.price >= priceRange[0] && p.price <= priceRange[1];
    const matchSearch = !searchQuery ||
      p.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
      (p.description||'').toLowerCase().includes(searchQuery.toLowerCase());
    return matchCat && matchWood && matchPrice && matchSearch;
  });
}

function getCategoryCount(catId) {
  return products.filter(p => p.category === catId).length;
}

// RENDER: HEADER
// =============================================

              <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
              Call Now
            </a>
            <button onclick="navigateTo('admin')" class="flex items-center px-4 py-2 rounded-full text-sm font-medium border-2 transition" style="border-color:${PRIMARY};color:${PRIMARY}">🔐 Admin</button>
          </div>
          <button onclick="showMobileMenu=!showMobileMenu;renderApp();" class="lg:hidden p-2 text-gray-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              ${showMobileMenu?'<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>':'<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>'}
            </svg>
          </button>

      </div>
    </div>
    ${showMobileMenu?`
    <div class="lg:hidden bg-white border-t">
      <div class="px-4 py-4 space-y-2">
        ${['home','products','categories','about','contact','admin'].map(p=>`
          <a href="#" onclick="navigateTo('${p}');showMobileMenu=false;renderApp();return false;" class="block px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-50 font-medium">${p.charAt(0).toUpperCase()+p.slice(1)}</a>

}

// =============================================
// RENDER: PRODUCT CARD
// =============================================
function renderProductCard(product, index=0) {
  if (!product) return '';
  const isWish = wishlist.includes(product._id);
  const discount = product.originalPrice > product.price ? Math.round((1-product.price/product.originalPrice)*100) : 0;
  const catName = (CATEGORIES.find(c=>c.id===product.category)||{}).name||'Furniture';
  const woodName = (WOOD_TYPES.find(w=>w.id===product.wood)||{}).name||'Wood';
  return `
  <div class="product-card group bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300">
    <div class="relative aspect-square overflow-hidden">
      <div class="product-img w-full h-full" style="background:${getProductBg(product)};min-height:200px;">
        ${(!product.images||product.images.length===0)?'<div class="absolute inset-0 flex items-center justify-center"><span class="text-6xl opacity-30">🪑</span></div>':''}
      </div>
      <div class="absolute top-3 left-3 flex flex-col gap-2">
        ${discount>0?`<span class="px-2 py-1 bg-red-500 text-white text-xs font-bold rounded-lg">${discount}% OFF</span>`:''}
        ${product.newArrival?'<span class="px-2 py-1 bg-green-500 text-white text-xs font-bold rounded-lg">NEW</span>':''}
        ${product.bestSeller?`<span class="px-2 py-1 text-white text-xs font-bold rounded-lg" style="background:${PRIMARY}">BESTSELLER</span>`:''}
      </div>
      <div class="absolute top-3 right-3 flex flex-col gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
        <button onclick="event.stopPropagation();toggleWishlist('${product._id}')" class="w-10 h-10 rounded-full bg-white shadow-lg flex items-center justify-center hover:scale-110 transition-transform">
          <svg class="w-5 h-5 ${isWish?'text-red-500':''}" fill="${isWish?'currentColor':'none'}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
        </button>
      </div>
      <div class="absolute inset-x-0 bottom-0 p-4 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity">
        <button onclick="openProductModal('${product._id}')" class="w-full py-2 bg-white rounded-lg font-medium text-charcoal hover:bg-gray-100 transition text-sm">Quick View</button>
      </div>
    </div>
    <div class="p-4 sm:p-5">
      <div class="flex items-center justify-between mb-2">
        <span class="text-xs font-medium px-2 py-1 rounded-full" style="background:${ACCENT}20;color:${PRIMARY}">${catName}</span>
        <div class="flex items-center text-amber-500">
          <svg class="w-4 h-4 fill-current" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
          <span class="text-xs ml-1 text-gray-600">${product.rating} (${product.reviewCount})</span>
        </div>
      </div>
      <h3 class="font-display font-semibold text-charcoal text-lg mb-1 line-clamp-2 cursor-pointer hover:text-wood-600 transition" onclick="openProductModal('${product._id}')">${product.name}</h3>
      <p class="text-sm text-gray-500 mb-3 line-clamp-2">${product.shortDesc}</p>
      <div class="flex items-center text-xs text-gray-500 mb-3"><span class="mr-1">🪵</span>${woodName}</div>
      <div class="flex items-center justify-between">
        <div>
          <span class="text-xl font-bold" style="color:${PRIMARY}">${formatPrice(product.price)}</span>
          ${product.originalPrice>product.price?`<span class="text-sm text-gray-400 line-through ml-2">${formatPrice(product.originalPrice)}</span>`:''}
        </div>
        <button onclick="openInquiryModal('${product._id}')" class="px-4 py-2 rounded-lg font-medium text-white text-sm transition hover:opacity-90" style="background:${PRIMARY}">Inquire</button>
      </div>
      <div class="mt-3 flex items-center text-xs">
        ${product.stock>0?`<span class="flex items-center text-green-600"><span class="w-2 h-2 rounded-full bg-green-500 mr-1.5"></span>In Stock (${product.stock})</span>`:`<span class="flex items-center text-orange-600"><span class="w-2 h-2 rounded-full bg-orange-500 mr-1.5"></span>Made to Order</span>`}
        ${product.customOrder?'<span class="ml-auto text-gray-500">✨ Custom Available</span>':''}
      </div>
    </div>
  </div>`;
}

  return `
  <section class="py-16 sm:py-20" style="background:${CREAM}">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="text-center mb-12">
        <h2 class="font-display text-3xl sm:text-4xl font-bold text-charcoal mb-4">Shop by Category</h2>
        <p class="text-gray-600 max-w-2xl mx-auto">Browse our extensive collection across different furniture categories</p>
      </div>
      <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-7 gap-4">
        ${CATEGORIES.map((cat,i)=>`

            <div class="flex justify-between py-2 border-b"><span class="text-gray-500">Wood Type</span><span class="font-medium">${(WOOD_TYPES.find(w=>w.id===product.wood)||{}).name||'-'}</span></div>
            <div class="flex justify-between py-2 border-b"><span class="text-gray-500">Dimensions</span><span class="font-medium">${product.dimensions||'—'}</span></div>
            <div class="flex justify-between py-2 border-b"><span class="text-gray-500">Stock</span><span class="font-medium ${product.stock>0?'text-green-600':'text-orange-600'}">${product.stock>0?`${product.stock} available`:'Made to Order'}</span></div>
            <div class="flex justify-between py-2 border-b"><span class="text-gray-500">Custom Order</span><span class="font-medium">${product.customOrder?'Available':'Not Available'}</span></div>
          </div>
          ${product.colors&&product.colors.length>0?`<div class="mb-6"><p class="text-sm font-medium text-gray-700 mb-2">Available Finishes:</p><div class="flex flex-wrap gap-2">${product.colors.map(c=>`<span class="px-3 py-1 rounded-full text-sm bg-gray-100">${c}</span>`).join('')}</div></div>`:''}
          <div class="flex gap-3">
            <button onclick="openInquiryModal('${product._id}')" class="flex-1 py-4 rounded-xl text-white font-semibold transition hover:opacity-90" style="background:${PRIMARY}">Inquire Now</button>
            <button onclick="toggleWishlist('${product._id}')" class="w-14 h-14 rounded-xl border-2 flex items-center justify-center transition hover:bg-gray-50" style="border-color:${PRIMARY}">
              <svg class="w-6 h-6 ${wishlist.includes(product._id)?'text-red-500':''}" fill="${wishlist.includes(product._id)?'currentColor':'none'}" stroke="currentColor" viewBox="0 0 24 24" style="color:${PRIMARY}"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
            </button>
          </div>
        </div>
      </div>
      ${related.length>0?`
      <div class="p-6 border-t">
        <h3 class="font-display text-xl font-bold text-charcoal mb-4">Related Products</h3>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
          ${related.map(p=>`
          <button onclick="selectedProduct='${p._id}';imageGalleryIndex=0;renderApp();" class="text-left">
            <div class="rounded-lg mb-2" style="background:${getProductBg(p)};aspect-ratio:1;min-height:80px"></div>
            <h4 class="font-medium text-sm text-charcoal line-clamp-2">${p.name}</h4>
            <p class="text-sm" style="color:${PRIMARY}">${formatPrice(p.price)}</p>
          </button>`).join('')}
        </div>
      </div>`:''}
    </div>
  </div>`;
}

  return `
  <div id="inquiry-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 modal-backdrop">
    <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full animate-scale-in" onclick="event.stopPropagation()">
      <div class="p-6">
        <div class="flex items-center justify-between mb-6">
          <h2 class="font-display text-xl font-bold text-charcoal">Product Inquiry</h2>
          <button onclick="closeInquiryModal()" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center hover:bg-gray-200 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>

        <form id="inquiry-form" onsubmit="handleInquirySubmit(event)">
          <input type="hidden" name="productId" id="inquiry-product-id">
          <input type="hidden" name="productName" id="inquiry-product-name">
          <div class="space-y-4">

            <div><label class="block text-sm font-medium text-gray-700 mb-2">Phone Number *</label><input type="tel" name="phone" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none transition" placeholder="Your phone"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-2">Message</label><textarea name="message" rows="3" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none transition resize-none" placeholder="Tell us your requirements...">I'm interested in this product. Please share more details.</textarea></div>

      </div>
    </div>
  </div>`;
}

function renderToast() {

  return `
  <div class="fixed top-24 right-4 z-50 toast">
    <div class="px-6 py-4 rounded-xl shadow-lg text-white font-medium flex items-center ${toastMessage.type==='success'?'bg-green-500':toastMessage.type==='error'?'bg-red-500':'bg-blue-500'}">
      <span class="mr-2">${toastMessage.type==='success'?'✅':toastMessage.type==='error'?'❌':'ℹ️'}</span>${toastMessage.message}
    </div>
  </div>`;
}

// =============================================
// EVENT HANDLERS
// =============================================
function navigateTo(page) {
  currentPage = page;
  showMobileMenu = false;
  selectedProduct = null;
  window.scrollTo(0,0);
  if(page==='admin' && isAdminLoggedIn) { loadAdminData(); }
  if(['home','products','categories','wishlist'].includes(page)) { loadProducts(); }
  renderApp();
}

function selectCategory(cat) {
  currentCategory = cat;
  currentPage = 'products';
  loadProducts({ category: cat });
}

function selectWood(wood) {
  currentWood = wood;
  currentPage = 'products';
  loadProducts({ wood });
}

function clearFilters() {
  currentCategory='all'; currentWood='all'; priceRange=[0,500000]; searchQuery='';
  loadProducts();
}

function updatePriceRange(val) {
  const [min,max] = val.split('-').map(Number);
  priceRange=[min,max]; renderApp();
}

function toggleWishlist(id) {
  if(wishlist.includes(id)) {
    wishlist=wishlist.filter(x=>x!==id);
    showToast('Removed from wishlist','info');
  } else {
    wishlist.push(id);
    showToast('Added to wishlist!','success');
  }
  localStorage.setItem('af_wishlist',JSON.stringify(wishlist));
  renderApp();
}

function openProductModal(id) {
  selectedProduct=id; imageGalleryIndex=0; renderApp();
}
function closeProductModal() {
  selectedProduct=null; renderApp();
}

function openInquiryModal(productId) {
  const p = products.find(x=>x._id===productId);
  if(!p) return;
  const modal=document.getElementById('inquiry-modal');
  if(modal) {
    document.getElementById('inquiry-product-info').innerHTML=`
      <div class="flex items-center">
        <div class="w-16 h-16 rounded-lg flex-shrink-0" style="background:${getProductBg(p)};${p.images&&p.images[0]?`background:url('${p.images[0]}') center/cover no-repeat`:''};min-height:64px"></div>
        <div class="ml-4"><h3 class="font-semibold text-charcoal">${p.name}</h3><p class="text-sm" style="color:${PRIMARY}">${formatPrice(p.price)}</p></div>
      </div>`;
    document.getElementById('inquiry-product-id').value=p._id;
    document.getElementById('inquiry-product-name').value=p.name;
    modal.style.display='flex';
  }
}
function closeInquiryModal() {
  const modal=document.getElementById('inquiry-modal');
  if(modal) modal.style.display='none';
}

function bulkWhatsApp() {
  const wlp=products.filter(p=>wishlist.includes(p._id));
  const msg=`Hi, I'm interested in: ${wlp.map(p=>p.name).join(', ')}`;
  window.open(`https://wa.me/918386020815?text=${encodeURIComponent(msg)}`,'_blank');
}

async function handleContactSubmit(event) {
  event.preventDefault();
  const fd=new FormData(event.target);
  const btn=event.target.querySelector('button[type=submit]');
  btn.disabled=true; btn.textContent='Sending...';
  try {
    const res=await apiPost('/api/inquiry',{
      type:'contact',name:fd.get('name'),phone:fd.get('phone'),
      email:fd.get('email')||'',message:fd.get('message')
    });
    if(res.success) {
      event.target.reset();
      showToast('Message sent! We will contact you soon.','success');
      // Open WhatsApp for admin notification if link provided
      if(res.whatsappLink) {
        setTimeout(()=>window.open(res.whatsappLink,'_blank'),1000);
      }
    } else { showToast(res.message||'Failed to send.','error'); }
  } catch(e) { showToast('Network error. Please try again.','error'); }
  btn.disabled=false; btn.textContent='Send Message';
}

async function handleInquirySubmit(event) {
  event.preventDefault();
  const fd=new FormData(event.target);
  const btn=event.target.querySelector('button[type=submit]');
  btn.disabled=true; btn.textContent='Sending...';
  try {
    const res=await apiPost('/api/inquiry',{
      type:'inquiry',name:fd.get('name'),phone:fd.get('phone'),
      email:'',message:fd.get('message')||'Interested in this product',
      productId:fd.get('productId'),productName:fd.get('productName')
    });
    if(res.success) {
      event.target.reset();
      closeInquiryModal();
      closeProductModal();
      showToast('Inquiry sent! We will contact you soon.','success');
      if(res.whatsappLink) setTimeout(()=>window.open(res.whatsappLink,'_blank'),1000);
    } else { showToast(res.message||'Failed to send.','error'); }
  } catch(e) { showToast('Network error. Please try again.','error'); }
  btn.disabled=false; btn.textContent='Send Inquiry';
}

async function handleAdminLogin(event) {
  event.preventDefault();
  const fd=new FormData(event.target);
  const btn=event.target.querySelector('button[type=submit]');
  btn.disabled=true; btn.textContent='Logging in...';
  try {
    const res=await apiPost('/api/admin/login',{username:fd.get('username'),password:fd.get('password')});
    if(res.success && res.token) {
      adminToken=res.token;
      localStorage.setItem('af_admin_token',adminToken);
      isAdminLoggedIn=true;
      showToast('Welcome to Admin Dashboard!','success');
      await loadAdminData();
      renderApp();
    } else { showToast(res.message||'Invalid credentials','error'); }
  } catch(e) { showToast('Network error','error'); }
  btn.disabled=false; btn.textContent='Login to Dashboard';
}

function handleAdminLogout() {
  adminToken=null; isAdminLoggedIn=false;
  localStorage.removeItem('af_admin_token');
  currentPage='home'; showToast('Logged out successfully','info');
  loadProducts(); renderApp();
}

async function handleProductSave(event) {
  event.preventDefault();
  const fd=new FormData(event.target);
  const ep=editingProduct;
  const payload={
    name:fd.get('name'),price:Number(fd.get('price')),
    originalPrice:Number(fd.get('originalPrice'))||0,
    stock:Number(fd.get('stock'))||0,
    category:fd.get('category'),wood:fd.get('wood'),
    shortDesc:fd.get('shortDesc'),description:fd.get('description'),
    dimensions:fd.get('dimensions')||'',
    featured:fd.get('featured')==='on',newArrival:fd.get('newArrival')==='on',
    bestSeller:fd.get('bestSeller')==='on',customOrder:fd.get('customOrder')==='on',
    images:ep.images||[]
  };
  try {
    let res;
    if(ep._id) { res=await apiPut(`/api/products/${ep._id}`,payload); }
    else { res=await apiPost('/api/products',payload,true); }
    if(res.success) {
      showToast(ep._id?'Product updated!':'Product added!','success');
      editingProduct=null;
      await loadProducts();
    } else { showToast(res.message||'Save failed','error'); }
  } catch(e) { showToast('Network error','error'); }
}

async function deleteProductAdmin(id) {
  if(!confirm('Delete this product? This cannot be undone.')) return;
  try {
    const res=await apiDelete(`/api/products/${id}`);
    if(res.success) { showToast('Product deleted','success'); editingProduct=null; await loadProducts(); }
    else { showToast(res.message||'Delete failed','error'); }
  } catch(e) { showToast('Network error','error'); }
}

async function updateInquiryAdmin(id, status) {
  try {
    const res=await apiPut(`/api/inquiry/${id}`,{status});
    if(res.success) { showToast('Status updated','success'); await loadAdminData(); }
  } catch(e) { showToast('Network error','error'); }
}

async function deleteInquiryAdmin(id) {
  if(!confirm('Delete this inquiry?')) return;
  try {
    const res=await apiDelete(`/api/inquiry/${id}`);
    if(res.success) { showToast('Inquiry deleted','success'); await loadAdminData(); }
  } catch(e) { showToast('Network error','error'); }
}

async function updateReviewAdmin(id, status) {
  try {
    const res=await apiPut(`/api/review/${id}`,{status});
    if(res.success) { showToast('Review updated','success'); await loadAdminData(); }
  } catch(e) { showToast('Network error','error'); }
}

async function handleImageUpload(event) {
  const files=event.target.files;
  if(!files||!editingProduct) return;
  if(!editingProduct.images) editingProduct.images=[];
  for(const file of files) {
    if(file.size>600000) { showToast(`${file.name} is too large. Max 500KB.`,'error'); continue; }
    const reader=new FileReader();
    reader.onload=async(e)=>{
      try {
        const res=await apiPost('/api/upload',{image:e.target.result},true);
        if(res.success) { editingProduct.images.push(res.url); renderApp(); }
        else { showToast(res.message||'Upload failed','error'); }
      } catch(err) { showToast('Upload error','error'); }
    };
    reader.readAsDataURL(file);
  }
}

// =============================================
// MAIN RENDER
// =============================================
function renderApp() {
  const app=document.getElementById('app');
  if(!app) return;
  let html='';
  if(currentPage==='admin') {
    html=isAdminLoggedIn?renderAdminDashboard():renderAdminLogin();
  } else {
    html=renderHeader();
    switch(currentPage) {
      case 'home':
        html+=renderHero();
        html+=renderCategorySection();
        html+=renderProductGrid('Featured Products','Handpicked premium furniture for your home','',p=>p.featured);
        html+=renderProductGrid('New Arrivals','Fresh designs just added to our collection','🆕 Just Arrived',p=>p.newArrival);
        html+=renderWoodSection();
        html+=renderProductGrid('Best Sellers','Most loved products by our customers','🏆 Customer Favorites',p=>p.bestSeller);
        html+=renderTestimonials();
        html+=renderCTA();
        break;
      case 'products': case 'categories': html+=renderProductsPage(); break;
      case 'contact': html+=renderContactPage(); break;
      case 'about': html+=renderAboutPage(); break;
      case 'wishlist': html+=renderWishlistPage(); break;
      default: html+=renderHero();
    }
    html+=renderFooter();
    html+=renderWhatsApp();
  }
  if(selectedProduct) html+=renderProductModal();
  html+=renderInquiryModal();
  html+=renderToast();
  app.innerHTML=html;
}

// =============================================
// INIT
// =============================================
loadProducts();
</script>
</body>
</html>
